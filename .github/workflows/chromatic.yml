name: Chromatic

# Visual regression testing for the component library.
# Requires a repo secret: CHROMATIC_PROJECT_TOKEN (Settings → Secrets and variables → Actions).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic needs full history to detect baselines
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/ui
          buildScriptName: build-storybook
          onlyChanged: true
          # Token/theme files are global — when they change, TurboSnap can't trace them
          # to individual stories (they live in the linked @ds/tokens package), so treat
          # them as "externals": any change re-snapshots ALL stories.
          externals: |
            packages/tokens/build/**
            packages/ui/tailwind.config.cjs
            packages/ui/src/styles/global.css
